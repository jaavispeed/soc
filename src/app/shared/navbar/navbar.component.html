<header
  class="fixed inset-x-0 top-0 z-30 mx-auto w-full max-w-screen-md border bg-white/80 py-3 shadow backdrop-blur-lg md:top-6 md:rounded-3xl lg:max-w-screen-lg"
>
  <div class="px-4">
    <div class="flex items-center justify-between">
      <!-- Logo -->
      <div class="flex shrink-0">
        <a class="flex items-center" href="/">
          <img
            class="h-8 sm:h-9 w-auto scale-110 sm:scale-125"
            loading="lazy"
            decoding="async"
            src="./socNegroCeleste.png"
            alt="Logo SOC"
          />
          <p class="sr-only">SOC</p>
        </a>
      </div>

      <!-- Botón hamburguesa (solo en mobile) -->
      <button
        class="md:hidden text-black focus:outline-none cursor-pointer"
        (click)="isMenuOpen = !isMenuOpen"
        aria-label="Abrir menú"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="h-6 w-6"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M4 6h16M4 12h16M4 18h16"
          />
        </svg>
      </button>

      <!-- Menú desktop -->
      <div class="hidden md:flex md:items-center md:gap-5">
        <a
          class="inline-block rounded-lg px-2 py-1 text-sm font-medium text-black transition-transform duration-200 hover:scale-105"
          href="#"
        >
          Reglamento
        </a>
      </div>
    </div>
    <!-- Menú móvil (usando @if) -->
    @if (isMenuOpen) {
    <div class="mt-3 md:hidden flex justify-center">
      <div >
        <a
          class="block text-center text-sm font-normal text-black tracking-wide transition-transform duration-200 hover:scale-105"
          href="#"
          (click)="isMenuOpen = false"
        >
          Reglamento
        </a>
      </div>
    </div>
    }
  </div>
</header>
